<div class="chatbot-wrapper">
  <!-- Toggle Button -->
  <button class="chat-toggle" (click)="toggleChat()" [attr.aria-label]="isOpen ? 'Close chat' : 'Open chat'">
    <span *ngIf="!isOpen" class="icon">💬</span>
    <span *ngIf="isOpen" class="icon">✕</span>
  </button>

  <!-- Chat Panel -->
  <div class="chat-panel" [class.open]="isOpen">
    <div class="chat-header">
      <div class="avatar">PPS</div>
      <div class="header-info">
        <span class="name">Pyae Phyo Shan</span>
        <span class="status">Digital Twin · AI</span>
      </div>
    </div>

    <div class="message-list" #messageList>
      <div
        *ngFor="let msg of messages"
        class="message"
        [class.user]="msg.role === 'user'"
        [class.assistant]="msg.role === 'assistant'"
      >
        <div class="bubble">{{ msg.content }}</div>
      </div>

      <div *ngIf="isLoading" class="message assistant">
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="chat-input">
      <textarea
        [(ngModel)]="userInput"
        (keydown)="onKeydown($event)"
        placeholder="Ask me anything…"
        rows="1"
        [disabled]="isLoading"
      ></textarea>
      <button (click)="sendMessage()" [disabled]="isLoading || !userInput.trim()">
        ➤
      </button>
    </div>
  </div>
</div>
