<div class="section-header">
  <span class="section-label">Career</span>
  <h2>Professional <span class="gradient-text">Experience</span></h2>
  <p>Roles and projects where I've delivered impactful software in real-world environments.</p>
</div>

<div class="timeline">
  <article class="exp-card" *ngFor="let exp of experiences; let first = first">
    <div class="card-accent"></div>

    <div class="card-top">
      <div class="card-title-row">
        <h3 class="role">{{ exp.role }}</h3>
        <span class="exp-type">{{ exp.type }}</span>
      </div>
      <div class="company-row">
        <a [href]="exp.company_site_link" target="_blank" rel="noreferrer" class="company">{{ exp.company }}</a>
        <span class="separator">·</span>
        <span class="location">{{ exp.location }}</span>
      </div>
      <span class="period">{{ exp.period }}</span>
    </div>

    <ul class="points">
      <li *ngFor="let point of exp.points">{{ point }}</li>
    </ul>
  </article>
</div>
